name: audit

# Weekly dependency-vulnerability scan (RustSec for the server, bun audit for
# the web UI). Advisory cadence: new CVEs land independent of pushes, so this
# runs on a schedule rather than per-commit. Manual runs via workflow_dispatch.

on:
  schedule:
    - cron: '0 6 * * 1' # Mondays 06:00 UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cargo-audit:
    name: cargo audit (RustSec)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable branch
        with:
          toolchain: stable
      - uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-audit
          key: ${{ runner.os }}-cargo-audit-bin
      - name: install cargo-audit
        run: command -v cargo-audit >/dev/null || cargo install cargo-audit --locked
      - run: cargo audit
        working-directory: server

  bun-audit:
    name: bun audit (npm advisories)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun audit

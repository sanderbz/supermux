name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  web:
    name: web (bun build)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest
      - uses: actions/cache@v4
        with:
          path: web/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('web/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - run: bun run build

  server:
    name: server (cargo check + test)
    runs-on: ubuntu-latest
    # A cold debug build (check ~5m + test-compile ~3.5m) plus the test run can
    # exceed 10m on a cache miss, which cancels the gating job mid-`cargo test`.
    # Give headroom. Debug only — CLAUDE.md forbids --release (OOM on small hosts).
    timeout-minutes: 20
    env:
      # Drop debug info on the dev profile so the lld link of the many
      # integration test binaries fits in the runner's memory ceiling. Without
      # this, the link of e.g. `status_detector` SIGBUSes (`ld: signal 7`) on
      # GitHub-hosted ubuntu-latest. Tests still run + pass; we only lose
      # file:line in panic backtraces in CI logs, which is fine.
      CARGO_PROFILE_DEV_DEBUG: "0"
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      # tests/static_assets.rs exercises the SPA the binary actually serves, so the
      # web bundle must be built and embedded (rust-embed reads server/static at
      # compile time) BEFORE the cargo steps — mirrors scripts/build.sh's embed step.
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest
      - name: Build + embed web bundle
        working-directory: web
        run: |
          bun install --frozen-lockfile
          bun run build
          rm -rf ../server/static && cp -r dist ../server/static
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable branch
        with:
          toolchain: stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            server/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('server/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      # Debug builds only — CLAUDE.md forbids --release in CI (OOM risk on
      # small hosts and the published binary is built natively by deploy.sh).
      - run: cargo check --all-targets
      - run: cargo test --no-run
      - run: cargo test

  fmt:
    name: fmt (rustfmt, advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable branch
        with:
          toolchain: stable
          components: rustfmt
      # Advisory only (non-blocking). The codebase is intentionally hand-formatted
      # in a compact style that diverges from stable rustfmt across ~150 files;
      # adopting rustfmt wholesale is a separate, deliberate decision. This step
      # still runs and prints the diff for reference, but a mismatch must NOT fail
      # CI or block merges.
      - run: cargo fmt --all -- --check
        continue-on-error: true

name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  web:
    name: web (bun build)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/cache@v4
        with:
          path: web/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('web/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - run: bun install --frozen-lockfile
      - run: bun run build

  server:
    name: server (cargo check + test)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            server/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('server/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      # Debug builds only — CLAUDE.md forbids --release in CI (OOM risk on
      # small hosts and the published binary is built natively by deploy.sh).
      - run: cargo check --all-targets
      - run: cargo test --no-run
      - run: cargo test

  fmt:
    name: fmt (rustfmt, advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      # Advisory only (non-blocking). The codebase is intentionally hand-formatted
      # in a compact style that diverges from stable rustfmt across ~150 files;
      # adopting rustfmt wholesale is a separate, deliberate decision. This step
      # still runs and prints the diff for reference, but a mismatch must NOT fail
      # CI or block merges.
      - run: cargo fmt --all -- --check
        continue-on-error: true

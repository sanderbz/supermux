<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- apple-touch-icon: 180×180, the iOS home-screen tile (M23b / §4.9). -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <!-- The web app manifest is injected by vite-plugin-pwa (M23b) as
         <link rel="manifest" href="/manifest.webmanifest">. The static
         public/manifest.json mirrors it for any non-PWA / dev consumer. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <!-- Brand splash color (M28): kept identical to manifest background_color
         and globals.css --background so the PWA splash has no flash of white. -->
    <meta name="theme-color" content="#0a0a0a" />
    <!-- Apple PWA meta (§4.8) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="supermux" />
    <!-- Embedded terminal font (Powerline + Nerd Font glyphs). Preload the
         Regular face so xterm's font-ready refit fires as soon as possible —
         no flash of fallback (Menlo) glyphs misaligning the grid. Bold is
         loaded lazily by @font-face when the shell first writes bold text. -->
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      href="/fonts/JetBrainsMonoNerdFontMono-Regular.woff2"
      crossorigin="anonymous"
    />
    <title>supermux</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

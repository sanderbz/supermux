<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- apple-touch-icon: 180×180, the iOS home-screen tile. -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <!-- The web app manifest is injected by vite-plugin-pwa as
         <link rel="manifest" href="/manifest.webmanifest">. The static
         public/manifest.json mirrors it for any non-PWA / dev consumer. -->
    <!-- interactive-widget=resizes-content: when the soft
         keyboard opens, supporting engines (Chrome/Android) shrink the LAYOUT
         viewport instead of scrolling the whole page up. iOS Safari/WKWebView
         support lags, so a visualViewport listener (use-keyboard-viewport.ts)
         is the belt-and-suspenders fallback. NOTE: deliberately NO
         user-scalable=no / maximum-scale — that is an a11y regression; the
         iOS focus-zoom is solved by ≥16px inputs instead. -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <!-- Brand splash color: kept identical to manifest background_color
         and globals.css --background so the PWA splash has no flash of white. -->
    <meta name="theme-color" content="#0a0a0a" />
    <!-- Apple PWA meta -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="supermux" />
    <!-- Embedded terminal font (Powerline + Nerd Font glyphs). Preload the
         Regular face so xterm's font-ready refit fires as soon as possible —
         no flash of fallback (Menlo) glyphs misaligning the grid. Bold is
         loaded lazily by @font-face when the shell first writes bold text. -->
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      href="/fonts/JetBrainsMonoNerdFontMono-Regular.woff2"
      crossorigin="anonymous"
    />
    <title>supermux</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

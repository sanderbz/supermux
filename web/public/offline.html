<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0a" />
    <title>supermux — offline</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <!--
      V034 PWA offline fallback. Served by the service worker when:
        - the user navigates to a supermux URL while the device is offline AND
          the SW cache lacks the precached HTML doc (first-visit cold start).
      Self-contained: zero JS framework, zero external CSS, zero fonts. Inline
      everything so this page renders even when nothing else can be fetched.
      Branded enough to read as supermux, not a generic browser error.
    -->
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #0a0a0a;
        color: #f5f5f7;
        font-family:
          -apple-system, BlinkMacSystemFont, 'SF Pro Text', system-ui,
          'Segoe UI', Roboto, sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 24px;
        text-align: center;
        gap: 12px;
        min-height: 100dvh;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 32px;
        color: rgba(245, 245, 247, 0.85);
      }
      .brand svg { height: 28px; width: auto; }
      .brand span {
        font-size: 16px;
        font-weight: 600;
        letter-spacing: -0.01em;
      }
      .icon {
        width: 64px;
        height: 64px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 9999px;
        background: rgba(245, 245, 247, 0.08);
        color: rgba(245, 245, 247, 0.7);
        margin-bottom: 12px;
      }
      .icon svg { width: 28px; height: 28px; }
      h1 {
        font-size: 20px;
        font-weight: 600;
        letter-spacing: -0.01em;
        margin: 0;
        color: #f5f5f7;
      }
      p {
        font-size: 14px;
        line-height: 1.55;
        margin: 4px 0 0;
        color: rgba(245, 245, 247, 0.6);
        max-width: 24rem;
      }
      button {
        margin-top: 24px;
        height: 44px;
        min-width: 10rem;
        padding: 0 24px;
        border: 0;
        border-radius: 8px;
        background: #007aff;
        color: #ffffff;
        font-size: 14px;
        font-weight: 600;
        font-family: inherit;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        transition: background-color 120ms ease-out;
      }
      button:hover { background: #0070ea; }
      button:active { background: #0066d4; }
      button svg { width: 16px; height: 16px; }
    </style>
  </head>
  <body>
    <div class="brand">
      <!-- supermux mark, inlined (copied from src/components/logo.tsx). -->
      <svg viewBox="294 158 474 704" xmlns="http://www.w3.org/2000/svg" aria-label="supermux" role="img">
        <defs>
          <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#3da0ff" />
            <stop offset="100%" stop-color="#007aff" />
          </linearGradient>
        </defs>
        <g transform="translate(1062 0) scale(-1 1)">
          <g transform="translate(357.67,157.60) scale(0.8166)">
            <path d="M 264.233,306.112 L 2.141,2.480 A 1.50,1.50 0 0 1 3.276,0.000 L 249.297,0.000 A 1.50,1.50 0 0 1 250.450,0.540 L 492.787,291.728 A 18.00,18.00 0 0 1 492.034,315.605 L 400.444,412.530 A 1.50,1.50 0 0 1 399.354,413.000 L 192.899,413.000 A 1.50,1.50 0 0 1 191.674,410.634 L 264.322,307.958 A 1.50,1.50 0 0 0 264.233,306.112 Z" fill="url(#g)" />
          </g>
          <g transform="translate(293.97,529.15) scale(0.8166)">
            <path d="M 219.543,405.460 L 0.867,147.024 A 1.50,1.50 0 0 1 0.922,145.025 L 137.556,0.470 A 1.50,1.50 0 0 1 138.646,0.000 L 308.094,0.000 A 1.50,1.50 0 0 1 309.316,2.369 L 225.679,120.044 A 1.50,1.50 0 0 0 225.764,121.890 L 441.897,373.747 A 18.00,18.00 0 0 1 428.455,403.468 L 220.707,405.991 A 1.50,1.50 0 0 1 219.543,405.460 Z" fill="url(#g)" />
          </g>
        </g>
      </svg>
      <span>supermux</span>
    </div>

    <div class="icon">
      <!-- lucide ServerCrash, inlined. -->
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M6 10H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v4a2 2 0 0 1-2 2h-2" />
        <path d="M6 14H4a2 2 0 0 0-2 2v4a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-4a2 2 0 0 0-2-2h-2" />
        <path d="M6 6h.01" />
        <path d="M6 18h.01" />
        <path d="m13 6-4 6h6l-4 6" />
      </svg>
    </div>

    <h1>Couldn’t reach the supermux server.</h1>
    <p>
      Either your network is down, or the server isn’t responding. Check your
      connection and try again.
    </p>

    <button type="button" onclick="window.location.reload()">
      <!-- lucide RotateCw -->
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8" />
        <path d="M21 3v5h-5" />
      </svg>
      Try again
    </button>
  </body>
</html>

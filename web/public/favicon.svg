<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="supermux">
  <title>supermux</title>
  <!--
    supermux favicon (M28). Same mark as icon.svg but framed tighter and bolder so
    it reads in a ~16px browser tab. Not maskable, so it uses a rounded-square
    tile rather than full bleed. Amber #f6ae31 on near-black #0a0a0a.
  -->
  <rect width="512" height="512" rx="112" fill="#0a0a0a"/>
  <path d="M119 150 L269 256 L119 362" fill="none" stroke="#f6ae31"
        stroke-width="56" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="289" y="300" width="104" height="48" rx="10" fill="#f6ae31"/>
</svg>
